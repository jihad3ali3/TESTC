<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{
box-sizing: border-box;
margin: 0;
padding: 0;
}
body{
background-image: url(5.png);
background-size:50%;
}
main{
width: 500px;
height: 300px;
margin:15% auto;
border-radius:50px;
border-top-right-radius:30px;
border-top-left-radius:30px;
border-bottom-right-radius:30px;
border-bottom-left-radius:30px;
background-color: rgb(86 23 13 / 9%);
backdrop-filter: blur(5px);
   animation-name: jihad;
animation-duration: 1s;
animation-iteration-count: infinite;
animation-direction:reverse;
animation-timing-function: ease-in-out;
}
header{
  width: 100%;
  height: 30px;
  line-height: 30px;
  background-color:black ;
  color: #c62828;
  font-size: large;
  text-align: center;
  border-top-left-radius: 50px;
  border-top-right-radius: 50px;
  transform: translateY(0%);
}
form{
  width: 95%;
  margin-bottom: 0;
  margin: 20px auto; 
  height:65%;
color: #aba5a5;
}
form input{
 float: right;
 width:80%;
 box-shadow: inset 0px 0px 4px 1px #c62828,
  inset 0px 0px 20px 4px #000000d4,
   inset -3px 1px 8px 4px #d2d6da,
    0px 0px 3px 0px #737b82;
}
.One input{
  margin-left: 5px;
  width: calc((80% - 5px)/2);
}
div{
  height:40%;
}
.One label:first-of-type{
  margin-left: 20%;
  margin-right: 33.5%;
  font-size: small;

}
.One label:last-of-type{
  font-size: small;

}

footer{
  width: 100%;
  height: 30px;
  line-height: 30px;
  background-color:black ;
  color: #c62828;
  font-size: large;
  text-align: center;
  transform: translateY(5px);
  border-bottom-left-radius:27px;
  border-bottom-right-radius:27px;
  margin-top: 0;
} 
@keyframes jihad{
0%{
border-top:3px solid #c62828;

border-left:3px solid #afb1b5;
border-bottom:3px solid #afb1b5;
border-right:3px solid #afb1b5 ;
}
25%{
  border-left:3px solid #c62828;
  border-top:3px solid #afb1b5 ;
border-bottom:3px solid #afb1b5 ;
border-right:3px solid #afb1b5 ;
}
50%{
  border-bottom:3px solid #c62828;
  border-left:3px solid #afb1b5 ;
border-right:3px solid #afb1b5 ;
border-top:3px solid #afb1b5; 
}
75%{
  border-right:3px solid #c62828;
  border-left:3px solid #afb1b5;
border-bottom:3px solid #afb1b5 ;
border-top:3px solid #afb1b5; 
}
100%{
  border-top:3px solid #afb1b5; 
  border-left:3px solid #afb1b5;
border-bottom:3px solid #afb1b5;
border-right:3px solid #afb1b5 ;
}
}
  </style>
</head>
<body>
  <main>
    <header>Welcome</header>
    <form>
      <div class="One">
<span>Name</span>
<input type="text">
        <input type="text">
        <br>
        
        <label>First</label>
        <label>Last</label>

      </div>
      <div class="Two">
        <label>Email</label>
        <input type="email">
      </div>

      <div class="Three">
        <label>Password</label>
        <input type="password">
      </div>
    </form>
    <footer>Welcome back</footer>


  </main>
   
</body>
</html>
